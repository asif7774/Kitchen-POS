# Kitchen POS Workflow Add New Feature With Ipc And Frontend Integration

## Action

Follow the add-new-feature-with-ipc-and-frontend-integration workflow:
1. Create backend IPC handler file (backend/src/ipc/feature-name.ts)
2. Update preload bindings (backend/src/preload.ts)
3. Update main entry if needed (backend/src/main.ts)
4. Define new types/interfaces (frontend/src/types/models.ts)
5. Add IPC bindings to frontend (frontend/src/lib/ipc.ts)
6. Create React context/hook if stateful (frontend/src/contexts/FeatureContext.tsx)
7. Add or update frontend component(s) (frontend/src/components/organisms/feature/FeatureComponent.tsx)
8. Wire provider into app (frontend/src/app/app.tsx)
9. Update relevant pages to use new feature (frontend/src/pages/...)

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: backend/src/ipc/*.ts, backend/src/preload.ts, backend/src/main.ts

