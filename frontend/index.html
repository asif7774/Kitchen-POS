<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Removed viewport meta tag to disable responsiveness for desktop app -->
    <!-- Defer non-critical resources - load after page is interactive -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Manifest is deferred to avoid blocking critical rendering path -->
    <script>
      // Load manifest asynchronously after page is interactive
      (function() {
        function loadManifest() {
          const link = document.createElement('link');
          link.rel = 'manifest';
          link.href = '/manifest.webmanifest';
          document.head.appendChild(link);
        }
        // Wait for page to be interactive before loading manifest
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', function() {
            // Defer further to avoid blocking - use requestIdleCallback if available
            if (window.requestIdleCallback) {
              window.requestIdleCallback(loadManifest, { timeout: 2000 });
            } else {
              setTimeout(loadManifest, 100);
            }
          });
        } else {
          if (window.requestIdleCallback) {
            window.requestIdleCallback(loadManifest, { timeout: 2000 });
          } else {
            setTimeout(loadManifest, 100);
          }
        }
      })();
    </script>
    
    <!-- SEO Meta Tags -->
    <title>Restaurant POS</title>
    <meta name="description" content="A modern, offline-first point-of-sale system for restaurants built with Electron, React, and SQLite." />
    <meta name="keywords" content="Restaurant, POS, Point of Sale, Electron, React, SQLite, Offline-first, Billing" />
    <meta name="author" content="Asif Ansari" />
    
    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="Restaurant POS" />
    <meta property="og:description" content="A modern, offline-first point-of-sale system for restaurants built with Electron, React, and SQLite." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://github.com/asif7774/restaurant-pos" />
    
    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Restaurant POS" />
    <meta name="twitter:description" content="A modern, offline-first point-of-sale system for restaurants built with Electron, React, and SQLite." />
    
    <!-- Theme Color -->
    <meta name="theme-color" content="#2563eb" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
